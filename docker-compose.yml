services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: car_ads_php
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    container_name: car_ads_nginx
    ports:
      - "80:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  db:
    image: postgres:16-alpine
    container_name: car_ads_db
    environment:
      POSTGRES_DB: loans
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
